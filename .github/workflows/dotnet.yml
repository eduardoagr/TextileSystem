name: Build TextileSystem

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    name: Build MAUI App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Install MAUI Workloads
        run: |
          dotnet workload install maui
          dotnet workload install android
          dotnet workload install ios
          dotnet workload install maccatalyst

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build all target frameworks
        run: dotnet build -c Release

      - name: Publish Windows EXE
        run: dotnet publish -f net10.0-windows10.0.19041.0 -c Release -o ./publish/win

      - name: Remove PDB file
        run: Remove-Item ./publish/win/*.pdb -ErrorAction SilentlyContinue

      - name: Create commit message file
        run: |
          $msg = "${{ github.event.head_commit.message }}"
          Set-Content -Path ./publish/win/commit_message.txt -Value $msg

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextileSystem-Windows
          path: ./publish/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
